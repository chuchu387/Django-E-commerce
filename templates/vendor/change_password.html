{% extends 'vendor_base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="page-shell-narrow">
  <header class="page-hero">
    <div>
      <span class="page-kicker">Kitchen Portal</span>
      <h1 class="page-title mb-0">Change Password</h1>
      <p class="page-lede">Update your account password.</p>
    </div>
  </header>

  <div class="surface-card p-4">
    <form action="" method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-medium">{{ field.label }}</label>
          {{ field }}
          {% for err in field.errors %}<div class="text-danger small">{{ err }}</div>{% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary w-100 mt-2">Change Password</button>
    </form>
  </div>
</div>
{% endblock %}
